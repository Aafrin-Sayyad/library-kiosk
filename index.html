<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Library Checkout Log</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      padding: 30px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
      font-size: 26px;
    }

    .form-box {
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 20px 25px;
      max-width: 500px;
      margin: 0 auto 30px auto;
    }

    .form-box h2 {
      margin-bottom: 15px;
      font-size: 18px;
      color: #444;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: #555;
    }

    .form-group input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: 14px;
    }

    .form-group input:focus {
      outline: none;
      border-color: #4a90d9;
    }

    button[type="submit"] {
      background-color: #4a90d9;
      color: white;
      border: none;
      padding: 9px 20px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 5px;
    }

    button[type="submit"]:hover {
      background-color: #357abd;
    }

    .table-section {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 20px;
    }

    .table-section h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #444;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead {
      background-color: #e8e8e8;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #ddd;
    }

    th {
      font-weight: bold;
      color: #333;
    }

    td {
      color: #555;
    }

    .delete-btn {
      background-color: #e74c3c;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn:hover {
      background-color: #c0392b;
    }

    .empty-msg {
      text-align: center;
      color: #888;
      padding: 20px 0;
      font-size: 14px;
    }

    .error-msg {
      color: red;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>📚 Library Book Checkout Log</h1>

  <div class="form-box">
    <h2>New Checkout</h2>
    <form id="checkout-form">
      <div class="form-group">
        <label for="book-title">Book Title</label>
        <input type="text" id="book-title" placeholder="Enter book title" />
      </div>
      <div class="form-group">
        <label for="patron-id">Patron ID</label>
        <input type="text" id="patron-id" placeholder="Enter patron ID" />
      </div>
      <p class="error-msg" id="error-msg">Please fill in all fields.</p>
      <button type="submit">Add Checkout</button>
    </form>
  </div>

  <div class="table-section">
    <h2>Checkout Records</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Book Title</th>
          <th>Patron ID</th>
          <th>Date & Time</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="log-table">
        <!-- rows go here -->
      </tbody>
    </table>
    <p class="empty-msg" id="empty-msg">No checkouts yet. Add one above.</p>
  </div>

  <script>
    // Phase 1: State
    let checkoutState = [];

    document.addEventListener('DOMContentLoaded', function() {
      var saved = localStorage.getItem('libraryLogs');
      if (saved) {
        checkoutState = JSON.parse(saved);
      }
      renderTable();
    });

    // Phase 2: Form Submit
    var form = document.getElementById('checkout-form');
    form.addEventListener('submit', function(e) {
      e.preventDefault();

      var title = document.getElementById('book-title').value.trim();
      var patronId = document.getElementById('patron-id').value.trim();
      var errorMsg = document.getElementById('error-msg');

      if (title === '' || patronId === '') {
        errorMsg.style.display = 'block';
        return;
      }

      errorMsg.style.display = 'none';

      var newEntry = {
        id: Date.now(),
        title: title,
        patronId: patronId,
        dateTime: new Date().toLocaleString()
      };

      checkoutState.push(newEntry);
      localStorage.setItem('libraryLogs', JSON.stringify(checkoutState));

      form.reset();
      renderTable();
    });

    function renderTable() {
      var tbody = document.getElementById('log-table');
      var emptyMsg = document.getElementById('empty-msg');

      tbody.innerHTML = '';

      if (checkoutState.length === 0) {
        emptyMsg.style.display = 'block';
        return;
      }

      emptyMsg.style.display = 'none';

      checkoutState.forEach(function(item, index) {
        var row = document.createElement('tr');
        row.innerHTML =
          '<td>' + (index + 1) + '</td>' +
          '<td>' + item.title + '</td>' +
          '<td>' + item.patronId + '</td>' +
          '<td>' + item.dateTime + '</td>' +
          '<td><button class="delete-btn" data-id="' + item.id + '">Delete</button></td>';
        tbody.appendChild(row);
      });
    }

    // Phase 3: Event Delegation for Delete
    document.getElementById('log-table').addEventListener('click', function(e) {
      if (e.target.classList.contains('delete-btn')) {
        var entryId = parseInt(e.target.getAttribute('data-id'));
        checkoutState = checkoutState.filter(function(item) {
          return item.id !== entryId;
        });
        localStorage.setItem('libraryLogs', JSON.stringify(checkoutState));
        renderTable();
      }
    });
  </script>

</body>
</html>
